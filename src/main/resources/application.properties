# Configuración por defecto para desarrollo local.
#
# Cualquiera de estos valores puede sobreescribirse vía variable de entorno;
# el nombre exacto de la variable que tiene prioridad aparece entre corchetes.
# Esto permite que el mismo binario corra en distintos entornos sin recompilar
# y que los secretos no queden hardcodeados en el repositorio.

db.host=localhost
db.port=15432
db.name=banco
db.user=banco
db.password=banco

# Variables de entorno que sobreescriben:
#   POSTGRES_DB       → db.name
#   POSTGRES_USER     → db.user
#   POSTGRES_PASSWORD → db.password
#   POSTGRES_HOST     → db.host
#   POSTGRES_PORT     → db.port
